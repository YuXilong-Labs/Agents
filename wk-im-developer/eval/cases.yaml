# wk-im-developer Eval Cases
# 从真实历史 PR/Issue 中选取后填充。当前为骨架。

feature_cases:
  - id: BTIM-F001
    type: feature
    input: "聊天页图片消息上传失败后增加重新上传入口"
    grading_criteria:
      scope_correct: true       # 只修改允许的文件
      contract_intact: true     # 无依赖方向违规
      has_tests: true           # 有测试文件变更
      privacy_safe: true        # 无敏感数据泄露

  - id: BTIM-F002
    type: feature
    input: "消息发送超时后展示超时状态气泡"
    grading_criteria:
      scope_correct: true
      contract_intact: true
      has_tests: true

  - id: BTIM-F003
    type: feature
    input: "会话列表支持置顶功能"
    grading_criteria:
      scope_correct: true
      contract_intact: true
      has_tests: true

bugfix_cases:
  - id: BTIM-B001
    type: bugfix
    input: "断网重连后会话未读数翻倍"
    grading_criteria:
      root_cause_identified: true
      has_failing_test_first: true  # 先写失败测试
      minimal_fix: true
      scope_correct: true

  - id: BTIM-B002
    type: bugfix
    input: "发送语音消息后 App 偶现 crash"
    grading_criteria:
      root_cause_identified: true
      scope_correct: true
      has_failing_test_first: true

  - id: BTIM-B003
    type: bugfix
    input: "消息列表滑动时偶现 UI 错位"
    grading_criteria:
      root_cause_identified: true
      scope_correct: true

knowledge_cases:
  - id: BTIM-K001
    type: knowledge
    input: "BTIMService 的消息状态机是怎么设计的？"
    grading_criteria:
      cites_files: true         # 引用了具体文件路径
      accurate_description: true

  - id: BTIM-K002
    type: knowledge
    input: "新人如何快速了解聊天页的架构？"
    grading_criteria:
      cites_files: true
      covers_key_components: true

  - id: BTIM-K003
    type: knowledge
    input: "BTIMModule 为什么不能直接 import ThirdPartyIMSDK？"
    grading_criteria:
      cites_files: true
      accurate_description: true

# 目标通过率
targets:
  knowledge: 0.80
  feature_simple: 0.70
  feature_cross_pod: 0.60
  bugfix: 0.60
  scope_violation_rate: 0.05  # < 5%
