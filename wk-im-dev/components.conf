# wk-im-dev 运行时组件清单（component manifest）。
# 这是组件相关数据的唯一事实源：组件名、角色、依赖规则、隐私词、只读路径。
# detect-env / guard / scope-check / init 都读它，不再硬编码组件名。
#
# 格式：<kind>\t<args...>  —— TAB 分隔，纯 bash 可解析，hook 上下文不依赖 jq。
# 由 create-wk-agent 生成器从 manifest 渲染；本文件即 wk-im-dev(IM) 实例的渲染结果。
#
# kind 说明：
#   agent          <slug>
#   component      <name> <role> [scope_root]   role 仅作语义标注；scope_root 默认 = name
#   forbid_import  <component> <forbidden>       <component> 源码中新增 import <forbidden> 即违规
#   privacy        <keyword>                     日志中出现该关键词即告警
#   readonly       <path-prefix>                 写入该前缀路径被拦截
#
agent	wk-im-dev
component	BTIMService	service	BTIMService
component	BTIMModule	module	BTIMModule
forbid_import	BTIMService	BTIMModule
forbid_import	BTIMModule	ThirdPartyIMSDK
forbid_import	BTIMModule	IMSDK
forbid_import	BTIMModule	TencentIMSDK
privacy	messageBody
privacy	msgContent
privacy	token
privacy	accessToken
privacy	cookie
privacy	attachmentURL
readonly	Pods/
readonly	ThirdPartySDK/
